<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Die with Zero</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #101014;
      color: #f4f1ea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .image-stage {
      position: relative;
      height: 100vh;
      height: 100dvh;
      aspect-ratio: 9 / 16;
      max-width: 100vw;
      container-type: inline-size;
      container-name: stage;
    }

    .countdown-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 1;
      width: calc(100% - 32px);
      transform: translate(-50%, -50%);
      padding: clamp(12px, 2cqw, 24px) clamp(16px, 2.5cqw, 32px);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      text-align: center;
      text-shadow: 0 2px 14px #000;
    }

    .countdown-panel:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 4px;
    }

    .countdown-grid {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(14px, 3cqw, 44px);
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-digits {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .countdown-digit {
      flex: 0 0 auto;
      width: clamp(42px, 7.2cqw, 96px);
      height: clamp(50px, 8.4cqw, 112px);
      margin-inline: clamp(-18px, -1.5cqw, -8px);
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7));
    }

    .countdown-label {
      margin-top: 4px;
      font-size: clamp(11px, 1.4cqw, 16px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(244, 241, 234, 0.82);
    }

    .countdown-grid--time {
      margin-top: clamp(10px, 1.6cqw, 20px);
      gap: clamp(10px, 2cqw, 30px);
    }

    .countdown-grid--time .countdown-digit {
      width: clamp(28px, 4.6cqw, 60px);
      height: clamp(34px, 5.4cqw, 72px);
      margin-inline: clamp(-12px, -1cqw, -5px);
    }

    .countdown-grid--time .countdown-label {
      font-size: clamp(10px, 1.2cqw, 14px);
    }

    .countdown-target {
      margin-top: 8px;
      font-size: clamp(12px, 1.6cqw, 18px);
      letter-spacing: 0.04em;
      color: rgba(244, 241, 234, 0.82);
    }

    .countdown-panel.is-unset .countdown-digits {
      opacity: 0.32;
    }

    .countdown-panel.is-unset .countdown-target {
      color: rgba(244, 241, 234, 0.6);
      font-style: italic;
    }

    .countdown-panel.is-expired .countdown-target {
      color: #ffb1b1;
    }

    .bottom-stack {
      position: absolute;
      right: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lastday-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(16, 16, 20, 0.78);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      font-family: Consolas, "Courier New", monospace;
    }

    .lastday-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .lastday-calc {
      padding-top: 8px;
      border-top: 1px solid rgba(244, 241, 234, 0.18);
    }

    .lastday-calc[hidden] {
      display: none;
    }

    .lastday-link {
      margin-left: auto;
      padding: 4px 0;
      border: 0;
      background: transparent;
      color: rgba(244, 241, 234, 0.78);
      cursor: pointer;
      font: inherit;
      text-decoration: underline dotted;
    }

    .lastday-link:hover {
      color: #f4f1ea;
    }

    .lastday-link:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .lastday-note {
      flex-basis: 100%;
      font-size: 0.82em;
      color: rgba(244, 241, 234, 0.55);
    }

    .lastday-label {
      color: #f4f1ea;
      flex: 0 0 auto;
    }

    .lastday-input {
      flex: 0 1 auto;
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 3px;
      background: rgba(16, 16, 20, 0.7);
      color: #f4f1ea;
      font: inherit;
    }

    .lastday-input:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
      border-color: #f4f1ea;
    }

    .lastday-age {
      width: 4em;
    }

    .lastday-pair {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .lastday-submit {
      padding: 4px 12px;
      border: 1px solid rgba(244, 241, 234, 0.6);
      border-radius: 3px;
      background: rgba(244, 241, 234, 0.1);
      color: #f4f1ea;
      cursor: pointer;
      font: inherit;
    }

    .lastday-submit:hover {
      background: rgba(244, 241, 234, 0.2);
    }

    .lastday-submit:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .audio-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(244, 241, 234, 0.5);
      border-radius: 50%;
      background: rgba(16, 16, 20, 0.72);
      color: #f4f1ea;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .audio-toggle:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 4px;
    }

    img,
    video {
      display: block;
      max-width: 100%;
    }

    .stage-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #101014;
    }

    .stage-video.is-buffering {
      opacity: 0;
      pointer-events: none;
    }

    .decade-strip {
      display: flex;
      align-items: stretch;
      gap: 4px;
      padding: 6px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(16, 16, 20, 0.78);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      font-family: Consolas, "Courier New", monospace;
      color: #f4f1ea;
    }

    .decade-strip[hidden] {
      display: none;
    }

    .decade-cell {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 2px;
      border: 1px solid rgba(244, 241, 234, 0.2);
      border-radius: 3px;
      background: rgba(244, 241, 234, 0.04);
      color: inherit;
      cursor: pointer;
      font: inherit;
      min-width: 0;
    }

    .decade-cell:hover {
      background: rgba(244, 241, 234, 0.14);
    }

    .decade-cell:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 0;
    }

    .decade-cell.is-current {
      border-color: rgba(244, 241, 234, 0.8);
      background: rgba(244, 241, 234, 0.12);
    }

    .decade-cell.is-past {
      opacity: 0.55;
    }

    .decade-cell-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(244, 241, 234, 0.78);
    }

    .decade-cell-counts {
      font-size: 12px;
      font-weight: 600;
    }

    .decade-cell-bar {
      width: 100%;
      height: 3px;
      background: rgba(244, 241, 234, 0.18);
      border-radius: 2px;
      overflow: hidden;
    }

    .decade-cell-bar-fill {
      height: 100%;
      background: rgba(244, 241, 234, 0.85);
    }

    .deck-launcher {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 10px;
      border: 1px solid rgba(244, 241, 234, 0.55);
      border-radius: 3px;
      background: rgba(244, 241, 234, 0.1);
      color: #f4f1ea;
      cursor: pointer;
      font: inherit;
    }

    .deck-launcher:hover {
      background: rgba(244, 241, 234, 0.2);
    }

    .deck-launcher:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .deck-launcher-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .deck-launcher-count {
      font-size: 13px;
      font-weight: 700;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(16, 16, 20, 0.82);
      backdrop-filter: blur(8px);
      font-family: Consolas, "Courier New", monospace;
      color: #f4f1ea;
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal-panel {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 8px;
      background: rgba(16, 16, 20, 0.96);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(244, 241, 234, 0.78);
    }

    .modal-close {
      padding: 2px 10px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 3px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }

    .modal-close:hover {
      background: rgba(244, 241, 234, 0.12);
    }

    .modal-close:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(244, 241, 234, 0.72);
    }

    .card-physicality {
      letter-spacing: 0.25em;
    }

    .card-text {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card-hint {
      margin: 0 0 18px;
      font-size: 12px;
      color: rgba(244, 241, 234, 0.62);
      font-style: italic;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .card-button {
      padding: 12px 8px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(244, 241, 234, 0.06);
      color: #f4f1ea;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .card-button:hover {
      background: rgba(244, 241, 234, 0.16);
    }

    .card-button:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .card-button.is-primary {
      border-color: rgba(244, 241, 234, 0.8);
      background: rgba(244, 241, 234, 0.18);
    }

    .card-empty {
      text-align: center;
      padding: 12px 0 4px;
      color: rgba(244, 241, 234, 0.8);
    }

    .decade-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .decade-picker-button {
      flex: 1 1 60px;
      min-width: 60px;
      padding: 8px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(244, 241, 234, 0.06);
      color: #f4f1ea;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .decade-picker-button:hover:not(:disabled) {
      background: rgba(244, 241, 234, 0.18);
    }

    .decade-picker-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .bucket-summary {
      margin-bottom: 12px;
      font-size: 13px;
      color: rgba(244, 241, 234, 0.78);
    }

    .bucket-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 48vh;
      overflow-y: auto;
    }

    .bucket-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      border-top: 1px solid rgba(244, 241, 234, 0.14);
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .bucket-item:first-child {
      border-top: 0;
    }

    .bucket-item-text {
      flex: 1 1 auto;
      min-width: 0;
      line-height: 1.3;
    }

    .bucket-item-phys {
      flex: 0 0 auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      color: rgba(244, 241, 234, 0.55);
      letter-spacing: 0.2em;
    }

    .bucket-item.is-claimed .bucket-item-text {
      text-decoration: line-through;
      color: rgba(244, 241, 234, 0.5);
    }

    .bucket-item.is-expired .bucket-item-text {
      text-decoration: line-through;
      color: #ffb1b1;
    }

    .bucket-item-action {
      flex: 0 0 auto;
      padding: 4px 8px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 3px;
      background: transparent;
      color: #f4f1ea;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .bucket-item-action:hover {
      background: rgba(244, 241, 234, 0.14);
    }

    .bucket-item-action:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 2px;
    }

    .bucket-empty {
      padding: 12px 0;
      text-align: center;
      color: rgba(244, 241, 234, 0.55);
      font-style: italic;
    }

    .rollover-list {
      margin: 8px 0 16px;
      padding: 0 0 0 18px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .rollover-list li {
      margin: 6px 0;
      color: #ffb1b1;
      font-family: Arial, Helvetica, sans-serif;
    }

    .rollover-text {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.4;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <main class="image-stage">
    <div class="countdown-panel is-unset" id="countdownPanel" aria-live="polite" aria-label="Time remaining" tabindex="0">
      <div class="countdown-grid">
        <div class="countdown-unit">
          <div class="countdown-digits" id="yearsDigits" aria-hidden="true"></div>
          <div class="countdown-label">years</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-digits" id="monthsDigits" aria-hidden="true"></div>
          <div class="countdown-label">months</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-digits" id="daysDigits" aria-hidden="true"></div>
          <div class="countdown-label">days</div>
        </div>
      </div>
      <div class="countdown-grid countdown-grid--time">
        <div class="countdown-unit">
          <div class="countdown-digits" id="hoursDigits" aria-hidden="true"></div>
          <div class="countdown-label">hours</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-digits" id="minutesDigits" aria-hidden="true"></div>
          <div class="countdown-label">minutes</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-digits" id="secondsDigits" aria-hidden="true"></div>
          <div class="countdown-label">seconds</div>
        </div>
      </div>
      <div class="countdown-target" id="countdownTarget">Set your estimated last day below.</div>
    </div>
    <video
      id="anchorVideo"
      class="stage-video"
      poster="succubus_anchor_01_4x4/anchor.png"
      aria-label="Succubus anchor transition"
      muted
      playsinline
      preload="auto"
    ></video>
    <video
      id="bufferVideo"
      class="stage-video is-buffering"
      aria-hidden="true"
      muted
      playsinline
      preload="auto"
    ></video>
    <button
      class="audio-toggle"
      id="audioToggle"
      type="button"
      aria-label="Play background music"
      title="Play background music"
    >&#9654;</button>
    <div class="bottom-stack">
      <div class="decade-strip" id="decadeStrip" hidden></div>
      <form class="lastday-form" id="lastdayForm" autocomplete="off">
        <div class="lastday-row">
          <label class="lastday-pair">
            <span class="lastday-label">Age</span>
            <input
              id="currentAge"
              class="lastday-input lastday-age"
              type="number"
              inputmode="numeric"
              min="0"
              max="150"
              step="1"
              aria-label="Current age"
              required
            >
          </label>
          <label class="lastday-pair">
            <span class="lastday-label">Death age</span>
            <input
              id="deathAge"
              class="lastday-input lastday-age"
              type="number"
              inputmode="numeric"
              min="1"
              max="150"
              step="1"
              aria-label="Death age"
              required
            >
          </label>
          <button type="button" class="lastday-link" id="calcToggle" aria-expanded="false" aria-controls="calcPanel">help me estimate</button>
          <button class="lastday-submit" type="submit">Set</button>
        </div>
        <div class="lastday-row lastday-calc" id="calcPanel" hidden>
          <label class="lastday-pair">
            <span class="lastday-label">Sex</span>
            <select id="calcSex" class="lastday-input">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </label>
          <label class="lastday-pair">
            <span class="lastday-label">Smoker</span>
            <select id="calcSmoker" class="lastday-input">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>
          <label class="lastday-pair">
            <span class="lastday-label">Health</span>
            <select id="calcHealth" class="lastday-input">
              <option value="excellent">Excellent</option>
              <option value="average" selected>Average</option>
              <option value="poor">Poor</option>
            </select>
          </label>
          <button type="button" class="lastday-submit" id="calcEstimate">Fill estimate</button>
          <div class="lastday-note">
            SSA period life table baseline, adjusted for smoking (Jha et al. 2013) and self-rated health (Idler &amp; Benyamini 1997). A rough US-population guide — override the result if your family history or lifestyle differs.
          </div>
        </div>
      </form>
    </div>
    <div class="modal-backdrop" id="deckModal" hidden role="dialog" aria-modal="true" aria-labelledby="deckTitle"></div>
    <div class="modal-backdrop" id="bucketModal" hidden role="dialog" aria-modal="true" aria-labelledby="bucketTitle"></div>
    <div class="modal-backdrop" id="rolloverModal" hidden role="dialog" aria-modal="true" aria-labelledby="rolloverTitle"></div>
  </main>
  <script>
    const digitAssetPath = 'clock_digits';
    const storageKey = 'dwz.ages';

    const countdownPanel = document.getElementById('countdownPanel');
    const yearsDigits = document.getElementById('yearsDigits');
    const monthsDigits = document.getElementById('monthsDigits');
    const daysDigits = document.getElementById('daysDigits');
    const hoursDigits = document.getElementById('hoursDigits');
    const minutesDigits = document.getElementById('minutesDigits');
    const secondsDigits = document.getElementById('secondsDigits');
    const countdownTarget = document.getElementById('countdownTarget');
    const lastdayForm = document.getElementById('lastdayForm');
    const currentAgeInput = document.getElementById('currentAge');
    const deathAgeInput = document.getElementById('deathAge');
    const calcToggle = document.getElementById('calcToggle');
    const calcPanel = document.getElementById('calcPanel');
    const calcSex = document.getElementById('calcSex');
    const calcSmoker = document.getElementById('calcSmoker');
    const calcHealth = document.getElementById('calcHealth');
    const calcEstimate = document.getElementById('calcEstimate');

    const anchorVideo = document.getElementById('anchorVideo');
    const bufferVideo = document.getElementById('bufferVideo');
    const audioToggle = document.getElementById('audioToggle');
    const videoRootPath = 'video_outputs_seedance_1_5_pro_handbrake';
    const transitionVideoBasePath = `${videoRootPath}/anchor_variations`;
    const idleVideoBasePath = `${videoRootPath}/idle_animations`;
    const blinkIdleVideoBasePath = `${videoRootPath}/idle_blink_animations`;
    const lookForwardIdleVideoBasePath = `${videoRootPath}/idle_look_forward`;
    const bodyTraceIdleVideoBasePath = `${videoRootPath}/idle_body_trace`;
    const anchorIdleVideo = `${idleVideoBasePath}/anchor_idle_4s.mp4`;
    const anchorBlinkIdleVideo = `${blinkIdleVideoBasePath}/anchor_idle_blink_4s.mp4`;
    const anchorLookForwardIdleVideo = `${lookForwardIdleVideoBasePath}/anchor_idle_look_forward_4s.mp4`;
    const anchorBodyTraceIdleVideo = `${bodyTraceIdleVideoBasePath}/anchor_idle_body_trace_4s.mp4`;
    const bgmTracks = [
      'music/Succubus_1.mp3',
      'music/Succubus_2.mp3'
    ];
    const videoTrimSeconds = 1 / 24;
    const successfulVariations = [
      { id: 'succubus_dwz_v01', subdir: '_diewithzero' },
      { id: 'succubus_dwz_v02', subdir: '_diewithzero' },
      { id: 'succubus_dwz_v03', subdir: '_diewithzero' },
      { id: 'succubus_dwz_v04', subdir: '_diewithzero' },
      { id: 'succubus_dwz_v05', subdir: '_diewithzero' },

    // Source: ssa.gov/oact/STATS/table4c6.html. Sparse anchor points; linearly interpolated.
    const lifeTableMale = [
      [0, 76.3], [10, 67.0], [20, 57.3], [25, 52.7], [30, 48.2],
      [35, 43.6], [40, 39.1], [45, 34.7], [50, 30.4], [55, 26.3],

    ];
    const lifeTableFemale = [
      [0, 81.4], [10, 72.1], [20, 62.4], [25, 57.7], [30, 53.0],
      [35, 48.3], [40, 43.7], [45, 39.1], [50, 34.7], [55, 30.4],
      [60, 26.2], [65, 22.0], [70, 18.0], [75, 14.2], [80, 10.6],
      [85, 7.6], [90, 5.3], [95, 3.6], [100, 2.5]
    ];

    function yearsRemainingAtAge(age, sex) {
      const table = sex === 'female' ? lifeTableFemale : lifeTableMale;
      if (age <= table[0][0]) {
        return table[0][1];
      }
      const last = table[table.length - 1];
      if (age >= last[0]) {
        return last[1];
      }
      for (let i = 0; i < table.length - 1; i += 1) {
        const [ageA, yearsA] = table[i];
        const [ageB, yearsB] = table[i + 1];
        if (age >= ageA && age < ageB) {
          const t = (age - ageA) / (ageB - ageA);
          return yearsA * (1 - t) + yearsB * t;
        }
      }
      return last[1];
    }

    function estimateDeathAge(currentAge, sex, smoker, health) {
      let years = yearsRemainingAtAge(currentAge, sex);
      if (smoker) {
        years -= 10;
      }
      if (health === 'excellent') {
        years += 3;
      } else if (health === 'poor') {
        years -= 6;
      }
      const result = Math.round(currentAge + years);
      return Math.max(currentAge + 1, Math.min(120, result));
    }

    function loadStoredAges() {

          parsed.currentAge < 0 || parsed.currentAge > 150 ||
          parsed.deathAge <= parsed.currentAge || parsed.deathAge > 150 ||
          typeof parsed.setAt !== 'string'
        ) {
          return null;
        }
        const setAt = new Date(parsed.setAt);
        if (Number.isNaN(setAt.getTime())) {
          return null;
        }
        return { currentAge: parsed.currentAge, deathAge: parsed.deathAge, setAt };
      } catch (error) {

      }
    }

    function targetFromAges(currentAge, deathAge, setAt) {
      const target = new Date(setAt);
      target.setFullYear(target.getFullYear() + (deathAge - currentAge));
      return target;
    }

    function calendarDiff(now, target) {
      if (target.getTime() <= now.getTime()) {
        return null;
      }

      let totalMonths = (target.getFullYear() - now.getFullYear()) * 12
        + (target.getMonth() - now.getMonth());
      let anchor = new Date(now);
      anchor.setMonth(anchor.getMonth() + totalMonths);
      while (anchor.getTime() > target.getTime() && totalMonths > 0) {
        totalMonths -= 1;
        anchor = new Date(now);
        anchor.setMonth(anchor.getMonth() + totalMonths);
      }

      const years = Math.floor(totalMonths / 12);
      const months = totalMonths - years * 12;

      const ms = target.getTime() - anchor.getTime();
      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds / 3600) % 24);
      const minutes = Math.floor((totalSeconds / 60) % 60);
      const seconds = totalSeconds % 60;

      return { years, months, days, hours, minutes, seconds };
    }

    function renderDigits(container, value, minDigits) {
      const text = String(value).padStart(minDigits, '0');
      const existing = container.children;

      for (let index = 0; index < text.length; index += 1) {
        const digit = text[index];
        let node = existing[index];
        if (!node) {
          node = document.createElement('img');
          node.className = 'countdown-digit';
          node.setAttribute('aria-hidden', 'true');
          container.appendChild(node);
        }
        if (node.dataset.digit !== digit) {
          node.src = `${digitAssetPath}/${digit}.png`;
          node.dataset.digit = digit;
          node.alt = digit;
        }
      }

      while (container.children.length > text.length) {
        container.removeChild(container.lastChild);
      }
    }

    function renderTime(hours, minutes, seconds) {
      renderDigits(hoursDigits, hours, 2);
      renderDigits(minutesDigits, minutes, 2);
      renderDigits(secondsDigits, seconds, 2);
    }

    function updateCountdown() {
      if (!targetDate) {
        renderDigits(yearsDigits, 0, 2);
        renderDigits(monthsDigits, 0, 2);
        renderDigits(daysDigits, 0, 2);

        countdownTarget.textContent = 'Enter your current age and estimated age of death below.';
        countdownPanel.setAttribute('aria-label', 'No life estimate set');
        return;
      }

      const now = new Date();
      const diff = calendarDiff(now, targetDate);

      if (!diff) {
        renderDigits(yearsDigits, 0, 2);
        renderDigits(monthsDigits, 0, 2);
        renderDigits(daysDigits, 0, 2);
        renderTime(0, 0, 0);
        countdownPanel.classList.remove('is-unset');

        countdownTarget.textContent = `Time is up — every moment past ${targetLabel} is borrowed.`;
        countdownPanel.setAttribute('aria-label', 'Time is up');
        return;
      }

      renderDigits(yearsDigits, diff.years, 2);
      renderDigits(monthsDigits, diff.months, 2);
      renderDigits(daysDigits, diff.days, 2);
      renderTime(diff.hours, diff.minutes, diff.seconds);

    }

    function getAges() {
      const c = Number(currentAgeInput.value);
      const d = Number(deathAgeInput.value);
      if (!Number.isInteger(c) || c < 0 || !Number.isInteger(d) || d <= c) {
        return null;
      }
      return { currentAge: c, deathAge: d };
    }

    function decadeOfAge(age) {
      return Math.floor(age / 10) * 10;
    }

    function listDecades(ages) {
      const start = Math.min(20, decadeOfAge(ages.currentAge));
      const end = decadeOfAge(ages.deathAge);
      const out = [];
      for (let d = start; d <= end; d += 10) {
        out.push(d);
      }
      return out;
    }

    function latestFeasibleDecade(physicality, ages) {
      const start = decadeOfAge(ages.currentAge);
      const end = decadeOfAge(ages.deathAge);
      const offset = physicalityDecadeOffset[physicality] || 0;
      return Math.min(end, start + offset);
    }

    function lookupExperience(id) {
      return EXPERIENCES.find(e => e.id === id) || null;
    }

    function getNextDeckCard() {
      for (const exp of EXPERIENCES) {
        if (!bucketState.items[exp.id]) {
          return exp;
        }
      }
      return null;
    }

    function deckRemaining() {
      let count = 0;
      for (const exp of EXPERIENCES) {
        if (!bucketState.items[exp.id]) count += 1;
      }
      return count;
    }

    function physicalityDots(n) {
      return '●'.repeat(n) + '○'.repeat(5 - n);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function physicalityHint(physicality, ages) {
      const cap = latestFeasibleDecade(physicality, ages);
      const current = decadeOfAge(ages.currentAge);
      if (physicality === 1) {
        return 'No body required — lands in your final decade unless you want it sooner.';
      }
      if (cap === current) {
        return `Body says: this decade only. If you want it, she puts it in your ${current}s.`;
      }
      return `Body cap: your ${cap}s.`;
    }

    function renderDecadeStrip() {
      const ages = getAges();
      if (!ages) {
        decadeStripEl.setAttribute('hidden', '');
        return;
      }
      const decades = listDecades(ages);
      const currentDecade = decadeOfAge(ages.currentAge);
      const counts = new Map(decades.map(d => [d, { planned: 0, claimed: 0, expired: 0 }]));
      for (const exp of EXPERIENCES) {
        const item = bucketState.items[exp.id];
        if (!item || item.status === 'skipped') continue;
        const bucket = counts.get(item.targetDecade);
        if (!bucket) continue;
        if (item.status === 'planned') bucket.planned += 1;
        else if (item.status === 'claimed') bucket.claimed += 1;
        else if (item.status === 'expired') bucket.expired += 1;
      }
      decadeStripEl.innerHTML = '';
      for (const d of decades) {
        const c = counts.get(d);
        const total = c.planned + c.claimed + c.expired;
        const fillPct = total === 0 ? 0 : Math.round((c.claimed / total) * 100);
        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'decade-cell';
        if (d === currentDecade) cell.classList.add('is-current');
        else if (d < currentDecade) cell.classList.add('is-past');
        cell.setAttribute('aria-label', `${d}s: ${c.claimed} claimed of ${total || 0}`);
        cell.innerHTML =
          `<span class="decade-cell-label">${d}s</span>` +
          `<span class="decade-cell-counts">${c.claimed}/${total || '–'}</span>` +
          `<span class="decade-cell-bar"><span class="decade-cell-bar-fill" style="width:${fillPct}%"></span></span>`;
        cell.addEventListener('click', () => openBucketDrawer(d));
        decadeStripEl.appendChild(cell);
      }
      const launcher = document.createElement('button');
      launcher.type = 'button';
      launcher.className = 'deck-launcher';
      const remaining = deckRemaining();
      launcher.setAttribute('aria-label', `Open deck (${remaining} experiences left)`);
      launcher.innerHTML =
        `<span class="deck-launcher-label">Deck</span>` +
        `<span class="deck-launcher-count">${remaining}</span>`;
      launcher.addEventListener('click', openDeck);
      decadeStripEl.appendChild(launcher);
      decadeStripEl.removeAttribute('hidden');
    }

    function openDeck() {
      const ages = getAges();
      if (!ages) return;
      renderDeck(ages, 'card', null);
      deckModal.removeAttribute('hidden');
    }

    function closeDeck() {
      deckModal.setAttribute('hidden', '');
      deckModal.innerHTML = '';
    }

    function renderDeck(ages, mode, focusedExp) {
      const exp = focusedExp || getNextDeckCard();
      if (!exp) {
        deckModal.innerHTML =
          `<div class="modal-panel">` +
            `<div class="modal-header">` +
              `<span id="deckTitle">Deck cleared</span>` +
              `<button type="button" class="modal-close" data-action="close-deck">Close</button>` +
            `</div>` +
            `<p class="card-empty">Every experience sorted. Tap any decade in the strip to see what's in it.</p>` +
          `</div>`;
        deckModal.querySelector('[data-action="close-deck"]').addEventListener('click', closeDeck);
        return;
      }
      const total = EXPERIENCES.length;
      const remaining = deckRemaining();
      const position = total - remaining + 1;
      if (mode === 'card') {
        deckModal.innerHTML =
          `<div class="modal-panel">` +
            `<div class="modal-header">` +
              `<span id="deckTitle">${position} / ${total}</span>` +
              `<button type="button" class="modal-close" data-action="close-deck">Close</button>` +
            `</div>` +
            `<div class="card-meta">` +
              `<span>${exp.category.toUpperCase()}</span>` +
              `<span class="card-physicality" title="Physicality ${exp.physicality}/5">${physicalityDots(exp.physicality)}</span>` +
            `</div>` +
            `<p class="card-text">${escapeHtml(exp.text)}</p>` +
            `<p class="card-hint">${escapeHtml(physicalityHint(exp.physicality, ages))}</p>` +
            `<div class="card-actions">` +
              `<button type="button" class="card-button" data-action="skip">Skip</button>` +
              `<button type="button" class="card-button" data-action="done">Done</button>` +
              `<button type="button" class="card-button is-primary" data-action="want">Want</button>` +
            `</div>` +
          `</div>`;
        deckModal.querySelector('[data-action="close-deck"]').addEventListener('click', closeDeck);
        deckModal.querySelector('[data-action="skip"]').addEventListener('click', () => handleSkip(exp, ages));
        deckModal.querySelector('[data-action="want"]').addEventListener('click', () => handleWant(exp, ages));
        deckModal.querySelector('[data-action="done"]').addEventListener('click', () => renderDeck(ages, 'done-picker', exp));
        return;
      }
      if (mode === 'done-picker') {
        const decades = listDecades(ages);
        const currentDecade = decadeOfAge(ages.currentAge);
        const pickable = decades.filter(d => d <= currentDecade);
        let pickerHtml = '';
        for (const d of pickable) {
          pickerHtml += `<button type="button" class="decade-picker-button" data-decade="${d}">${d}s</button>`;
        }
        deckModal.innerHTML =
          `<div class="modal-panel">` +
            `<div class="modal-header">` +
              `<span id="deckTitle">When?</span>` +
              `<button type="button" class="modal-close" data-action="back">Back</button>` +
            `</div>` +
            `<p class="card-text">${escapeHtml(exp.text)}</p>` +
            `<p class="card-hint">Which decade did you do it in?</p>` +
            `<div class="decade-picker">${pickerHtml}</div>` +
          `</div>`;
        deckModal.querySelector('[data-action="back"]').addEventListener('click', () => renderDeck(ages, 'card', exp));
        deckModal.querySelectorAll('.decade-picker-button').forEach(btn => {
          btn.addEventListener('click', () => handleDone(exp, ages, Number(btn.dataset.decade)));
        });
      }
    }

    function handleSkip(exp, ages) {
      bucketState.items[exp.id] = {
        status: 'skipped',
        targetDecade: null,
        updatedAt: new Date().toISOString()
      };
      saveBucketState();
      renderDecadeStrip();
      renderDeck(ages, 'card', null);
    }

    function handleWant(exp, ages) {
      const target = latestFeasibleDecade(exp.physicality, ages);
      bucketState.items[exp.id] = {
        status: 'planned',
        targetDecade: target,
        updatedAt: new Date().toISOString()
      };
      saveBucketState();
      renderDecadeStrip();
      renderDeck(ages, 'card', null);
    }

    function handleDone(exp, ages, decade) {
      bucketState.items[exp.id] = {
        status: 'claimed',
        targetDecade: decade,
        claimedDecade: decade,
        updatedAt: new Date().toISOString()
      };
      saveBucketState();
      renderDecadeStrip();
      renderDeck(ages, 'card', null);
    }

    function openBucketDrawer(decade) {
      const ages = getAges();
      if (!ages) return;
      renderBucketDrawer(decade, ages);
      bucketModal.removeAttribute('hidden');
    }

    function closeBucketDrawer() {
      bucketModal.setAttribute('hidden', '');
      bucketModal.innerHTML = '';
    }

    function renderBucketDrawer(decade, ages) {
      const items = [];
      for (const exp of EXPERIENCES) {
        const state = bucketState.items[exp.id];
        if (!state || state.status === 'skipped') continue;
        if (state.targetDecade !== decade) continue;
        items.push({ exp, state });
      }
      const rank = (status) => status === 'planned' ? 0 : status === 'claimed' ? 1 : 2;
      items.sort((a, b) => rank(a.state.status) - rank(b.state.status));
      const claimed = items.filter(i => i.state.status === 'claimed').length;
      const expired = items.filter(i => i.state.status === 'expired').length;
      const planned = items.filter(i => i.state.status === 'planned').length;
      const currentDecade = decadeOfAge(ages.currentAge);
      const isPast = decade < currentDecade;
      let listHtml = '';
      if (items.length === 0) {
        listHtml = `<li class="bucket-empty">Nothing in this decade yet.</li>`;
      } else {
        for (const { exp, state } of items) {
          const statusClass = state.status === 'claimed' ? ' is-claimed'
            : state.status === 'expired' ? ' is-expired' : '';
          const action = state.status === 'planned' && !isPast
            ? `<button type="button" class="bucket-item-action" data-action="claim" data-id="${exp.id}">Claim</button>`
            : '';
          listHtml +=
            `<li class="bucket-item${statusClass}">` +
              `<span class="bucket-item-text">${escapeHtml(exp.text)}</span>` +
              `<span class="bucket-item-phys" title="Physicality ${exp.physicality}/5">${physicalityDots(exp.physicality)}</span>` +
              action +
            `</li>`;
        }
      }
      const summaryParts = [`${claimed} claimed`, `${planned} planned`];
      if (expired) summaryParts.push(`${expired} expired`);
      bucketModal.innerHTML =
        `<div class="modal-panel">` +
          `<div class="modal-header">` +
            `<span id="bucketTitle">Your ${decade}s</span>` +
            `<button type="button" class="modal-close" data-action="close-bucket">Close</button>` +
          `</div>` +
          `<p class="bucket-summary">${summaryParts.join(' · ')}</p>` +
          `<ul class="bucket-list">${listHtml}</ul>` +
        `</div>`;
      bucketModal.querySelector('[data-action="close-bucket"]').addEventListener('click', closeBucketDrawer);
      bucketModal.querySelectorAll('[data-action="claim"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const existing = bucketState.items[id];
          if (!existing) return;
          bucketState.items[id] = {
            status: 'claimed',
            targetDecade: existing.targetDecade,
            claimedDecade: currentDecade,
            updatedAt: new Date().toISOString()
          };
          saveBucketState();
          renderDecadeStrip();
          renderBucketDrawer(decade, ages);
        });
      });
    }

    function detectAndShowRollover() {
      const ages = getAges();
      if (!ages) return;
      const currentDecade = decadeOfAge(ages.currentAge);
      if (bucketState.lastSeenDecade === null) {
        bucketState.lastSeenDecade = currentDecade;
        saveBucketState();
        return;
      }
      if (currentDecade <= bucketState.lastSeenDecade) return;
      const newlyExpired = [];
      for (const exp of EXPERIENCES) {
        const item = bucketState.items[exp.id];
        if (!item || item.status !== 'planned') continue;
        if (item.targetDecade < currentDecade) {
          item.status = 'expired';
          item.updatedAt = new Date().toISOString();
          newlyExpired.push(exp);
        }
      }
      bucketState.lastSeenDecade = currentDecade;
      saveBucketState();
      if (newlyExpired.length > 0) {
        showRolloverModal(newlyExpired);
        renderDecadeStrip();
      }
    }

    function showRolloverModal(expired) {
      const listHtml = expired.map(e => `<li>${escapeHtml(e.text)}</li>`).join('');
      rolloverModal.innerHTML =
        `<div class="modal-panel">` +
          `<div class="modal-header">` +
            `<span id="rolloverTitle">A decade has closed</span>` +
            `<button type="button" class="modal-close" data-action="close-rollover">Acknowledge</button>` +
          `</div>` +
          `<p class="rollover-text">She took back what you didn't claim in time:</p>` +
          `<ul class="rollover-list">${listHtml}</ul>` +
          `<p class="rollover-text">They live in your buckets now, crossed out — the body and time they needed has rolled past.</p>` +
        `</div>`;
      rolloverModal.querySelector('[data-action="close-rollover"]').addEventListener('click', () => {
        rolloverModal.setAttribute('hidden', '');
        rolloverModal.innerHTML = '';
      });
      rolloverModal.removeAttribute('hidden');
    }

    function isAnyBucketModalOpen() {
      return !deckModal.hasAttribute('hidden') ||
             !bucketModal.hasAttribute('hidden') ||
             !rolloverModal.hasAttribute('hidden');
    }

    function isBucketUi(target) {
      if (!target || !target.closest) return false;
      return Boolean(target.closest('.bottom-stack, .modal-backdrop'));
    }

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      if (!rolloverModal.hasAttribute('hidden')) {
        rolloverModal.setAttribute('hidden', '');
        rolloverModal.innerHTML = '';
        return;
      }
      if (!deckModal.hasAttribute('hidden')) {
        closeDeck();
        return;
      }
      if (!bucketModal.hasAttribute('hidden')) {
        closeBucketDrawer();
      }
    });

    function nextVariation() {
      const variationVideo = variationVideos[nextVariationIndex];
      nextVariationIndex = (nextVariationIndex + 1) % variationVideos.length;
      return variationVideo;
    }

    function nextCloseupVariation() {
      const variationVideo = closeupVariationVideos[nextCloseupVariationIndex];
      nextCloseupVariationIndex = (nextCloseupVariationIndex + 1) % closeupVariationVideos.length;
      return variationVideo;
    }

    function prefetchVideo(src) {
      const existing = prefetchedMedia.get(src);
      if (existing) {
        return existing;
      }

      const preload = fetch(src).then((response) => {
        if (!response.ok) {
          throw new Error(`Unable to preload ${src}`);
        }
      }).catch((error) => {
        prefetchedMedia.delete(src);
        throw error;
      });

      prefetchedMedia.set(src, preload);
      return preload;
    }

    function warmVideo(video, src) {
      video.preload = 'auto';
      video.src = src;
      video.load();
    }

    function prefetchBgm() {
      return Promise.allSettled(bgmTracks.map(prefetchVideo));
    }

    function prefetchAnchorIdles() {
      return Promise.allSettled([
        anchorIdleVideo,
        anchorBlinkIdleVideo,
        anchorLookForwardIdleVideo,
        anchorBodyTraceIdleVideo
      ].map(prefetchVideo));
    }

    function prefetchVariation(variationVideo) {
      return Promise.allSettled([
        variationVideo.forward,
        variationVideo.idle,
        variationVideo.blinkIdle,
        variationVideo.lookForwardIdle,
        variationVideo.bodyTraceIdle,
        variationVideo.reverse
      ].map(prefetchVideo));
    }

    function prefetchNextTransition() {
      return prefetchVideo(variationVideos[nextVariationIndex].forward).catch(() => {});
    }

    function shuffledClips(idleClips) {
      const clips = [...idleClips];
      for (let index = clips.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [clips[index], clips[randomIndex]] = [clips[randomIndex], clips[index]];
      }
      return clips;
    }

    function nextIdleClip(queueKey, idleClips) {
      const queue = idleClipQueues.get(queueKey) || [];
      if (!queue.length) {
        queue.push(...shuffledClips(idleClips));
        idleClipQueues.set(queueKey, queue);
      }

      return queue.shift();
    }

    function peekIdleClip(queueKey, idleClips) {
      const queue = idleClipQueues.get(queueKey) || [];
      if (!queue.length) {
        queue.push(...shuffledClips(idleClips));
        idleClipQueues.set(queueKey, queue);
      }

      return queue[0];
    }

    function willCompleteIdleCycle(queueKey) {
      return (idleClipPlayCounts.get(queueKey) || 0) + 1 >= 4;
    }

    function countIdleClipPlay(queueKey) {
      const playCount = (idleClipPlayCounts.get(queueKey) || 0) + 1;
      if (playCount >= 4) {
        idleClipPlayCounts.set(queueKey, 0);
        return true;
      }

      idleClipPlayCounts.set(queueKey, playCount);
      return false;
    }

    function skipActiveClip() {
      if (
        activeVideo &&
        !activeVideo.paused &&
        Number.isFinite(activeVideo.duration) &&
        activeVideo.duration > 0
      ) {
        activeVideo.currentTime = Math.max(0, activeVideo.duration - videoTrimSeconds);
      }
    }

    function requestTransition() {
      if (isTransitioning) {
        return;
      }

      transitionRequested = true;
      skipActiveClip();
    }

    function requestCloseupVariation() {
      if (isTransitioning) {
        return;
      }

      if (isCloseupEventActive) {
        transitionRequested = true;
        skipActiveClip();
        return;
      }

      if (requestedCloseupVariation) {
        return;
      }

      const closeupVariation = nextCloseupVariation();
      requestedCloseupVariation = closeupVariation;
      prefetchVariation(closeupVariation);
      transitionRequested = true;
      skipActiveClip();
    }

    function playNextBgm() {
      bgmAudio.src = bgmTracks[nextBgmIndex];
      nextBgmIndex = (nextBgmIndex + 1) % bgmTracks.length;
      bgmAudio.play().catch(() => {
        bgmStarted = false;
        updateAudioToggle();
      });
      updateAudioToggle();
    }

    function startBgm() {
      if (bgmStarted) {
        return;
      }

      bgmStarted = true;
      bgmAudio.volume = 0.45;
      playNextBgm();
    }

    function stopBgm() {
      bgmStarted = false;
      bgmAudio.pause();
      updateAudioToggle();
    }

    function toggleBgm() {
      if (bgmStarted && !bgmAudio.paused) {
        stopBgm();
      } else {
        startBgm();
      }
    }

    function updateAudioToggle() {
      const isPlaying = bgmStarted && !bgmAudio.paused;
      audioToggle.textContent = isPlaying ? '⏹' : '▶';
      audioToggle.setAttribute(
        'aria-label',
        isPlaying ? 'Stop background music' : 'Play background music'
      );
      audioToggle.title = isPlaying ? 'Stop background music' : 'Play background music';
    }

    function loadVideo(video, src) {
      return new Promise((resolve) => {
        function finish() {
          video.oncanplay = null;
          video.onerror = null;
          resolve();
        }

        video.oncanplay = finish;
        video.onerror = finish;
        video.src = src;
        video.load();
      });
    }

    function prepareVideo(src) {
      if (preparedVideoSrc === src) {
        return preparedVideoLoad;
      }

      preparedVideoSrc = src;
      preparedVideoLoad = loadVideo(inactiveVideo, src);
      return preparedVideoLoad;
    }

    async function playVideo(src, nextSrc = '') {
      await prepareVideo(src);

      const previousVideo = activeVideo;
      const nextVideo = inactiveVideo;
      activeVideo = nextVideo;
      inactiveVideo = previousVideo;
      preparedVideoSrc = '';
      preparedVideoLoad = Promise.resolve();

      activeVideo.classList.remove('is-buffering');
      inactiveVideo.classList.add('is-buffering');
      inactiveVideo.pause();
      const currentVideo = activeVideo;

      return new Promise((resolve) => {
        let trimFrame = 0;
        let finished = false;

        function finish() {
          if (finished) {
            return;
          }

          finished = true;
          cancelAnimationFrame(trimFrame);
          currentVideo.onended = null;
          currentVideo.onerror = null;
          resolve();
        }

        function checkTrim() {
          if (
            Number.isFinite(currentVideo.duration) &&
            currentVideo.duration - currentVideo.currentTime <= videoTrimSeconds
          ) {
            finish();
            return;
          }
          trimFrame = requestAnimationFrame(checkTrim);
        }

        currentVideo.onended = finish;
        currentVideo.onerror = finish;
        currentVideo.play().catch(finish);
        trimFrame = requestAnimationFrame(checkTrim);
        if (nextSrc) {
          prepareVideo(nextSrc);
        }
      });
    }

    async function playVariationEvent(variationVideo, anchorIdleClips, isCloseupEvent = false) {
      prefetchVariation(variationVideo);
      prefetchNextTransition();

      isTransitioning = true;
      const variationIdleClips = [
        { src: variationVideo.idle },
        { src: variationVideo.blinkIdle },
        { src: variationVideo.lookForwardIdle },
        { src: variationVideo.bodyTraceIdle }
      ];
      await playVideo(
        variationVideo.forward,
        peekIdleClip(variationVideo.id, variationIdleClips).src
      );
      isTransitioning = false;
      isCloseupEventActive = isCloseupEvent;

      while (!transitionRequested && !requestedCloseupVariation) {
        const variationIdleClip = nextIdleClip(variationVideo.id, variationIdleClips);
        const variationCycleWillComplete = willCompleteIdleCycle(variationVideo.id);
        const variationNextSrc = variationCycleWillComplete
          ? variationVideo.reverse
          : peekIdleClip(variationVideo.id, variationIdleClips).src;

        await playVideo(variationIdleClip.src, variationNextSrc);
        if (countIdleClipPlay(variationVideo.id)) {
          transitionRequested = true;
        }
      }

      transitionRequested = false;
      isCloseupEventActive = false;
      isTransitioning = true;
      await playVideo(
        variationVideo.reverse,
        requestedCloseupVariation
          ? requestedCloseupVariation.forward
          : peekIdleClip('anchor', anchorIdleClips).src
      );
      isTransitioning = false;
    }

    async function runVideoSequence() {
      const anchorIdleClips = [
        { src: anchorIdleVideo },
        { src: anchorBlinkIdleVideo },
        { src: anchorLookForwardIdleVideo },
        { src: anchorBodyTraceIdleVideo }
      ];

      while (true) {
        if (requestedCloseupVariation) {
          const variationVideo = requestedCloseupVariation;
          requestedCloseupVariation = null;
          await playVariationEvent(variationVideo, anchorIdleClips, true);
          continue;
        }

        const anchorIdleClip = nextIdleClip('anchor', anchorIdleClips);
        const anchorCycleWillComplete = willCompleteIdleCycle('anchor');
        const anchorNextSrc = requestedCloseupVariation
          ? requestedCloseupVariation.forward
          : anchorCycleWillComplete
          ? variationVideos[nextVariationIndex].forward
          : peekIdleClip('anchor', anchorIdleClips).src;

        await playVideo(anchorIdleClip.src, anchorNextSrc);
        const anchorCycleComplete = countIdleClipPlay('anchor');

        if (!transitionRequested && !anchorCycleComplete) {
          continue;
        }

        transitionRequested = false;
        const isCloseupEvent = Boolean(requestedCloseupVariation);
        const variationVideo = requestedCloseupVariation || nextVariation();
        requestedCloseupVariation = null;
        await playVariationEvent(variationVideo, anchorIdleClips, isCloseupEvent);
      }
    }

    initFromStorage();
    updateCountdown();
    setInterval(updateCountdown, 1000);

    async function warmInitialMedia() {
      prefetchAnchorIdles();
      prefetchBgm();
      prefetchNextTransition();
    }

    async function startPlayback() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => navigator.serviceWorker.ready)
          .then(warmInitialMedia)
          .catch(() => {});
      } else {
        warmInitialMedia();
      }

      warmVideo(anchorVideo, anchorIdleVideo);
      runVideoSequence();
    }

    startPlayback();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        prefetchAnchorIdles();
        prefetchNextTransition();
      });
    }

    bgmAudio.addEventListener('ended', playNextBgm);
    audioToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      toggleBgm();
    });

    function isFormElement(element) {
      if (!element) {
        return false;
      }
      return lastdayForm.contains(element);
    }

    function isStageInteraction(target) {
      if (isFormElement(target)) return false;
      if (isBucketUi(target)) return false;
      return true;
    }

    document.addEventListener('click', (event) => {
      if (!isStageInteraction(event.target)) {
        return;
      }
      if (isAnyBucketModalOpen()) {
        return;
      }
      requestCloseupVariation();
    });
    document.addEventListener('touchstart', (event) => {
      if (!isStageInteraction(event.target)) {
        return;
      }
      if (isAnyBucketModalOpen()) {
        return;
      }
      requestCloseupVariation();
    }, { passive: true });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Tab') {
        return;
      }
      if (event.key === 'Escape') {
        return;
      }
      if (isFormElement(document.activeElement)) {
        return;
      }
      if (isBucketUi(document.activeElement)) {
        return;
      }
      if (isAnyBucketModalOpen()) {
        return;
      }
      requestTransition();
    });
  </script>
</body>
</html>
