<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Succubus Anchor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101014;
      color: #f4f1ea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .image-stage {
      position: relative;
      width: min(100vw, 100vh);
      max-width: 100%;
    }

    .clock-panel {
      position: absolute;
      top: 16px;
      left: 50%;
      z-index: 1;
      width: calc(100% - 32px);
      transform: translateX(-50%);
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 2px 10px #000;
    }

    .clock {
      font-size: clamp(18px, 3vw, 32px);
    }

    .clock:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 6px;
      border-radius: 4px;
    }

    .countdown {
      margin-top: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(12px, 1.8vw, 18px);
      color: rgba(244, 241, 234, 0.86);
    }

    .command-line {
      position: absolute;
      right: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(16, 16, 20, 0.78);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      font-family: Consolas, "Courier New", monospace;
    }

    .command-line span {
      color: #f4f1ea;
      flex: 0 0 auto;
    }

    .command-line input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #f4f1ea;
      font: inherit;
    }

    .command-line:focus-within {
      border-color: #f4f1ea;
    }

    .audio-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(244, 241, 234, 0.5);
      border-radius: 50%;
      background: rgba(16, 16, 20, 0.72);
      color: #f4f1ea;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .audio-toggle:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 4px;
    }

    img,
    video {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .stage-video {
      background: #101014;
    }

    .stage-video.is-buffering {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="image-stage">
    <div class="clock-panel">
      <div class="clock" id="clock" aria-live="polite" tabindex="0"></div>
      <div class="countdown" id="countdown" aria-live="polite"></div>
    </div>
    <video
      id="anchorVideo"
      class="stage-video"
      poster="succubus_anchor_01_4x4/anchor.png"
      aria-label="Succubus anchor transition"
      muted
      playsinline
      preload="auto"
    ></video>
    <video
      id="bufferVideo"
      class="stage-video is-buffering"
      aria-hidden="true"
      muted
      playsinline
      preload="auto"
    ></video>
    <button
      class="audio-toggle"
      id="audioToggle"
      type="button"
      aria-label="Play background music"
      title="Play background music"
    >&#9654;</button>
    <label class="command-line">
      <span>&gt;</span>
      <input id="commandInput" type="text" aria-label="Command line" autocomplete="off" spellcheck="false">
    </label>
  </main>
  <script>
    const clock = document.getElementById('clock');
    const countdown = document.getElementById('countdown');
    const anchorVideo = document.getElementById('anchorVideo');
    const bufferVideo = document.getElementById('bufferVideo');
    const commandInput = document.getElementById('commandInput');
    const audioToggle = document.getElementById('audioToggle');
    const transitionVideoBasePath = 'video_outputs_seedance_1_5_pro/anchor_variations';
    const idleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_animations';
    const blinkIdleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_blink_animations';
    const lookForwardIdleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_look_forward';
    const bodyTraceIdleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_body_trace';
    const anchorIdleVideo = `${idleVideoBasePath}/anchor_idle_4s.mp4`;
    const anchorBlinkIdleVideo = `${blinkIdleVideoBasePath}/anchor_idle_blink_4s.mp4`;
    const anchorLookForwardIdleVideo = `${lookForwardIdleVideoBasePath}/anchor_idle_look_forward_4s.mp4`;
    const anchorBodyTraceIdleVideo = `${bodyTraceIdleVideoBasePath}/anchor_idle_body_trace_4s.mp4`;
    const bgmTracks = [
      'music/Succubus_1.mp3',
      'music/Succubus_2.mp3'
    ];
    const videoTrimSeconds = 1 / 24;
    const successfulVariations = [
      'img_0001',
      'img_0002',
      'img_0003',
      'img_0004',
      'img_0005',
      'img_0006',
      'img_0007',
      'img_0008',
      'img_0009',
      'img_0010',
      'img_0011',
      'img_0012',
      'img_0013',
      'img_0014',
      'img_0015',
      'img_0016',
      'img_0017',
      'img_0018'
    ];
    const variationVideos = successfulVariations.map((variationId) => ({
      id: variationId,
      forward: `${transitionVideoBasePath}/${variationId}_anchor_to_variation_8s.mp4`,
      idle: `${idleVideoBasePath}/${variationId}_idle_4s.mp4`,
      blinkIdle: `${blinkIdleVideoBasePath}/${variationId}_idle_blink_4s.mp4`,
      lookForwardIdle: `${lookForwardIdleVideoBasePath}/${variationId}_idle_look_forward_4s.mp4`,
      bodyTraceIdle: `${bodyTraceIdleVideoBasePath}/${variationId}_idle_body_trace_4s.mp4`,
      reverse: `${transitionVideoBasePath}/${variationId}_variation_to_anchor_4s.mp4`
    }));
    let nextVariationIndex = 0;
    let activeVideo = anchorVideo;
    let inactiveVideo = bufferVideo;
    let transitionRequested = false;
    let isTransitioning = false;
    let idleLocation = 'anchor';
    let nextBgmIndex = 0;
    let bgmStarted = false;
    const bgmAudio = new Audio();
    const idleClipQueues = new Map();
    const idleClipPlayCounts = new Map();
    const prefetchedMedia = new Map();
    let preparedVideoSrc = '';
    let preparedVideoLoad = Promise.resolve();
    const commands = [
      'clock',
      'date',
      'help',
      'image',
      'time'
    ];

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function nextVariation() {
      const variationVideo = variationVideos[nextVariationIndex];
      nextVariationIndex = (nextVariationIndex + 1) % variationVideos.length;
      return variationVideo;
    }

    function prefetchVideo(src) {
      if (prefetchedMedia.has(src)) {
        return prefetchedMedia.get(src);
      }

      const preload = fetch(src).then((response) => {
        if (!response.ok) {
          throw new Error(`Unable to preload ${src}`);
        }
        return response.arrayBuffer().then(() => true);
      }).catch((error) => {
        prefetchedMedia.delete(src);
        throw error;
      });

      prefetchedMedia.set(src, preload);
      return preload;
    }

    function warmVideo(video, src) {
      video.preload = 'auto';
      video.src = src;
      video.load();
    }

    function prefetchBgm() {
      return Promise.allSettled(bgmTracks.map(prefetchVideo));
    }

    function prefetchAnchorIdles() {
      return Promise.allSettled([
        anchorIdleVideo,
        anchorBlinkIdleVideo,
        anchorLookForwardIdleVideo,
        anchorBodyTraceIdleVideo
      ].map(prefetchVideo));
    }

    function prefetchVariation(variationVideo) {
      return Promise.allSettled([
        variationVideo.forward,
        variationVideo.idle,
        variationVideo.blinkIdle,
        variationVideo.lookForwardIdle,
        variationVideo.bodyTraceIdle,
        variationVideo.reverse
      ].map(prefetchVideo));
    }

    function prefetchNextTransition() {
      return prefetchVideo(variationVideos[nextVariationIndex].forward).catch(() => {});
    }

    function shuffledClips(idleClips) {
      const clips = [...idleClips];
      for (let index = clips.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [clips[index], clips[randomIndex]] = [clips[randomIndex], clips[index]];
      }
      return clips;
    }

    function nextIdleClip(queueKey, idleClips) {
      const queue = idleClipQueues.get(queueKey) || [];
      if (!queue.length) {
        queue.push(...shuffledClips(idleClips));
        idleClipQueues.set(queueKey, queue);
      }

      return queue.shift();
    }

    function peekIdleClip(queueKey, idleClips) {
      const queue = idleClipQueues.get(queueKey) || [];
      if (!queue.length) {
        queue.push(...shuffledClips(idleClips));
        idleClipQueues.set(queueKey, queue);
      }

      return queue[0];
    }

    function willCompleteIdleCycle(queueKey) {
      return (idleClipPlayCounts.get(queueKey) || 0) + 1 >= 4;
    }

    function countIdleClipPlay(queueKey) {
      const playCount = (idleClipPlayCounts.get(queueKey) || 0) + 1;
      if (playCount >= 4) {
        idleClipPlayCounts.set(queueKey, 0);
        return true;
      }

      idleClipPlayCounts.set(queueKey, playCount);
      return false;
    }

    function requestTransition() {
      if (isTransitioning) {
        return;
      }

      transitionRequested = true;
      countdown.textContent = idleLocation === 'anchor' ? 'Variation queued' : 'Return queued';
    }

    function playNextBgm() {
      bgmAudio.src = bgmTracks[nextBgmIndex];
      nextBgmIndex = (nextBgmIndex + 1) % bgmTracks.length;
      bgmAudio.play().catch(() => {
        bgmStarted = false;
        updateAudioToggle();
      });
      updateAudioToggle();
    }

    function startBgm() {
      if (bgmStarted) {
        return;
      }

      bgmStarted = true;
      bgmAudio.volume = 0.45;
      playNextBgm();
    }

    function stopBgm() {
      bgmStarted = false;
      bgmAudio.pause();
      updateAudioToggle();
    }

    function toggleBgm() {
      if (bgmStarted && !bgmAudio.paused) {
        stopBgm();
      } else {
        startBgm();
      }
    }

    function updateAudioToggle() {
      const isPlaying = bgmStarted && !bgmAudio.paused;
      audioToggle.textContent = isPlaying ? '\u23f9' : '\u25b6';
      audioToggle.setAttribute(
        'aria-label',
        isPlaying ? 'Stop background music' : 'Play background music'
      );
      audioToggle.title = isPlaying ? 'Stop background music' : 'Play background music';
    }

    function loadVideo(video, src) {
      return new Promise((resolve) => {
        function finish() {
          video.oncanplay = null;
          video.onerror = null;
          resolve();
        }

        video.oncanplay = finish;
        video.onerror = finish;
        video.src = src;
        video.load();
      });
    }

    function prepareVideo(src) {
      if (preparedVideoSrc === src) {
        return preparedVideoLoad;
      }

      preparedVideoSrc = src;
      preparedVideoLoad = loadVideo(inactiveVideo, src);
      return preparedVideoLoad;
    }

    async function playVideo(src, statusText, nextSrc = '') {
      await prepareVideo(src);

      const previousVideo = activeVideo;
      const nextVideo = inactiveVideo;
      activeVideo = nextVideo;
      inactiveVideo = previousVideo;
      preparedVideoSrc = '';
      preparedVideoLoad = Promise.resolve();

      countdown.textContent = statusText;
      activeVideo.classList.remove('is-buffering');
      inactiveVideo.classList.add('is-buffering');
      inactiveVideo.pause();
      const currentVideo = activeVideo;

      return new Promise((resolve) => {
        let trimFrame = 0;
        let finished = false;

        function finish() {
          if (finished) {
            return;
          }

          finished = true;
          cancelAnimationFrame(trimFrame);
          currentVideo.onended = null;
          currentVideo.onerror = null;
          resolve();
        }

        function checkTrim() {
          if (
            Number.isFinite(currentVideo.duration) &&
            currentVideo.duration - currentVideo.currentTime <= videoTrimSeconds
          ) {
            finish();
            return;
          }
          trimFrame = requestAnimationFrame(checkTrim);
        }

        currentVideo.onended = finish;
        currentVideo.onerror = finish;
        currentVideo.play().catch(finish);
        trimFrame = requestAnimationFrame(checkTrim);
        if (nextSrc) {
          prepareVideo(nextSrc);
        }
      });
    }

    async function runVideoSequence() {
      const anchorIdleClips = [
        { name: 'regular', src: anchorIdleVideo },
        { name: 'blink', src: anchorBlinkIdleVideo },
        { name: 'look forward', src: anchorLookForwardIdleVideo },
        { name: 'body trace', src: anchorBodyTraceIdleVideo }
      ];

      while (true) {
        idleLocation = 'anchor';
        const anchorIdleClip = nextIdleClip('anchor', anchorIdleClips);
        const anchorCycleWillComplete = willCompleteIdleCycle('anchor');
        const anchorNextSrc = anchorCycleWillComplete
          ? variationVideos[nextVariationIndex].forward
          : peekIdleClip('anchor', anchorIdleClips).src;

        await playVideo(anchorIdleClip.src, `Anchor idle: ${anchorIdleClip.name}`, anchorNextSrc);
        const anchorCycleComplete = countIdleClipPlay('anchor');

        if (!transitionRequested && !anchorCycleComplete) {
          continue;
        }

        transitionRequested = false;
        const variationVideo = nextVariation();
        prefetchVariation(variationVideo);
        prefetchNextTransition();

        isTransitioning = true;
        const variationIdleClips = [
            { name: 'regular', src: variationVideo.idle },
            { name: 'blink', src: variationVideo.blinkIdle },
            { name: 'look forward', src: variationVideo.lookForwardIdle },
            { name: 'body trace', src: variationVideo.bodyTraceIdle }
        ];
        await playVideo(
          variationVideo.forward,
          `Transition to ${variationVideo.id}`,
          peekIdleClip(variationVideo.id, variationIdleClips).src
        );
        isTransitioning = false;

        idleLocation = 'variation';
        while (!transitionRequested) {
          const variationIdleClip = nextIdleClip(variationVideo.id, variationIdleClips);
          const variationCycleWillComplete = willCompleteIdleCycle(variationVideo.id);
          const variationNextSrc = variationCycleWillComplete
            ? variationVideo.reverse
            : peekIdleClip(variationVideo.id, variationIdleClips).src;

          await playVideo(
            variationIdleClip.src,
            `${variationVideo.id} idle: ${variationIdleClip.name}`,
            variationNextSrc
          );
          if (countIdleClipPlay(variationVideo.id)) {
            transitionRequested = true;
          }
        }

        transitionRequested = false;
        isTransitioning = true;
        await playVideo(
          variationVideo.reverse,
          'Transition back to anchor',
          peekIdleClip('anchor', anchorIdleClips).src
        );
        isTransitioning = false;
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    commandInput.focus();

    async function warmInitialMedia() {
      prefetchAnchorIdles();
      prefetchBgm();
      prefetchNextTransition();
    }

    async function startPlayback() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => navigator.serviceWorker.ready)
          .then(warmInitialMedia)
          .catch(() => {});
      } else {
        warmInitialMedia();
      }

      warmVideo(anchorVideo, anchorIdleVideo);
      runVideoSequence();
    }

    startPlayback();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        prefetchAnchorIdles();
        prefetchNextTransition();
      });
    }

    bgmAudio.addEventListener('ended', playNextBgm);
    audioToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      toggleBgm();
    });

    document.addEventListener('click', () => {
      requestTransition();
    });
    document.addEventListener('touchstart', () => {
      requestTransition();
    }, { passive: true });
    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Tab') {
        requestTransition();
      }
    });

    commandInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Tab') {
        return;
      }

      const value = commandInput.value;
      const commandStart = value.search(/\S+$/);
      const prefix = commandStart === -1 ? '' : value.slice(commandStart);
      const match = commands.find((command) => command.startsWith(prefix.toLowerCase()));

      if (!match || match === prefix) {
        return;
      }

      event.preventDefault();
      const leadingText = commandStart === -1 ? value : value.slice(0, commandStart);
      commandInput.value = `${leadingText}${match}`;
    });
  </script>
</body>
</html>
