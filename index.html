<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Succubus Anchor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101014;
      color: #f4f1ea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .image-stage {
      position: relative;
      width: min(100vw, 100vh);
      max-width: 100%;
    }

    .clock-panel {
      position: absolute;
      top: 16px;
      left: 50%;
      z-index: 1;
      width: calc(100% - 32px);
      transform: translateX(-50%);
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 2px 10px #000;
    }

    .clock {
      font-size: clamp(18px, 3vw, 32px);
    }

    .clock:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 6px;
      border-radius: 4px;
    }

    .countdown {
      margin-top: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(12px, 1.8vw, 18px);
      color: rgba(244, 241, 234, 0.86);
    }

    .command-line {
      position: absolute;
      right: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(16, 16, 20, 0.78);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      font-family: Consolas, "Courier New", monospace;
    }

    .command-line span {
      color: #f4f1ea;
      flex: 0 0 auto;
    }

    .command-line input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #f4f1ea;
      font: inherit;
    }

    .command-line:focus-within {
      border-color: #f4f1ea;
    }

    img,
    video {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .stage-video {
      background: #101014;
    }

    .stage-video.is-buffering {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="image-stage">
    <div class="clock-panel">
      <div class="clock" id="clock" aria-live="polite" tabindex="0"></div>
      <div class="countdown" id="countdown" aria-live="polite"></div>
    </div>
    <video
      id="anchorVideo"
      class="stage-video"
      poster="succubus_anchor_01_4x4/anchor.png"
      aria-label="Succubus anchor transition"
      muted
      playsinline
      preload="auto"
    ></video>
    <video
      id="bufferVideo"
      class="stage-video is-buffering"
      aria-hidden="true"
      muted
      playsinline
      preload="auto"
    ></video>
    <label class="command-line">
      <span>&gt;</span>
      <input id="commandInput" type="text" aria-label="Command line" autocomplete="off" spellcheck="false">
    </label>
  </main>
  <script>
    const clock = document.getElementById('clock');
    const countdown = document.getElementById('countdown');
    const anchorVideo = document.getElementById('anchorVideo');
    const bufferVideo = document.getElementById('bufferVideo');
    const commandInput = document.getElementById('commandInput');
    const transitionVideoBasePath = 'video_outputs_seedance_1_5_pro/anchor_variations';
    const idleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_animations';
    const blinkIdleVideoBasePath = 'video_outputs_seedance_1_5_pro/idle_blink_animations';
    const anchorIdleVideo = `${idleVideoBasePath}/anchor_idle_4s.mp4`;
    const anchorBlinkIdleVideo = `${blinkIdleVideoBasePath}/anchor_idle_blink_4s.mp4`;
    const videoTrimSeconds = 1 / 24;
    const successfulVariations = [
      'img_0001',
      'img_0002',
      'img_0003',
      'img_0004',
      'img_0005',
      'img_0006',
      'img_0007',
      'img_0008',
      'img_0009',
      'img_0010',
      'img_0011',
      'img_0012',
      'img_0013',
      'img_0014',
      'img_0015',
      'img_0016',
      'img_0017',
      'img_0018'
    ];
    const variationVideos = successfulVariations.map((variationId) => ({
      id: variationId,
      forward: `${transitionVideoBasePath}/${variationId}_anchor_to_variation_8s.mp4`,
      idle: `${idleVideoBasePath}/${variationId}_idle_4s.mp4`,
      blinkIdle: `${blinkIdleVideoBasePath}/${variationId}_idle_blink_4s.mp4`,
      reverse: `${transitionVideoBasePath}/${variationId}_variation_to_anchor_4s.mp4`
    }));
    let nextVariationIndex = 0;
    let activeVideo = anchorVideo;
    let inactiveVideo = bufferVideo;
    const prefetchedVideos = new Set();
    const commands = [
      'clock',
      'date',
      'help',
      'image',
      'time'
    ];

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function nextVariation() {
      const variationVideo = variationVideos[nextVariationIndex];
      nextVariationIndex = (nextVariationIndex + 1) % variationVideos.length;
      return variationVideo;
    }

    function prefetchVideo(src) {
      if (prefetchedVideos.has(src)) {
        return;
      }

      prefetchedVideos.add(src);
      fetch(src).catch(() => {
        prefetchedVideos.delete(src);
      });
    }

    function prefetchVariation(variationVideo) {
      prefetchVideo(anchorIdleVideo);
      prefetchVideo(anchorBlinkIdleVideo);
      prefetchVideo(variationVideo.forward);
      prefetchVideo(variationVideo.idle);
      prefetchVideo(variationVideo.blinkIdle);
      prefetchVideo(variationVideo.reverse);
    }

    function prefetchNextVariation() {
      prefetchVariation(variationVideos[nextVariationIndex]);
    }

    function randomIdleVideo(regularVideo, blinkVideo) {
      return Math.random() < 0.5 ? blinkVideo : regularVideo;
    }

    function loadVideo(video, src) {
      return new Promise((resolve) => {
        function finish() {
          video.oncanplay = null;
          video.onerror = null;
          resolve();
        }

        video.oncanplay = finish;
        video.onerror = finish;
        video.src = src;
        video.load();
      });
    }

    async function playVideo(src, statusText) {
      await loadVideo(inactiveVideo, src);

      const previousVideo = activeVideo;
      const nextVideo = inactiveVideo;
      activeVideo = nextVideo;
      inactiveVideo = previousVideo;

      countdown.textContent = statusText;
      activeVideo.classList.remove('is-buffering');
      inactiveVideo.classList.add('is-buffering');
      inactiveVideo.pause();

      return new Promise((resolve) => {
        let trimTimer;

        function finish() {
          clearInterval(trimTimer);
          activeVideo.onended = null;
          activeVideo.onerror = null;
          activeVideo.ontimeupdate = null;
          activeVideo.pause();
          resolve();
        }

        activeVideo.onended = finish;
        activeVideo.onerror = finish;
        activeVideo.ontimeupdate = () => {
          if (
            Number.isFinite(activeVideo.duration) &&
            activeVideo.duration - activeVideo.currentTime <= videoTrimSeconds
          ) {
            finish();
          }
        };
        trimTimer = setInterval(activeVideo.ontimeupdate, 100);
        activeVideo.play().catch(finish);
      });
    }

    async function runVideoSequence() {
      while (true) {
        const variationVideo = nextVariation();
        prefetchNextVariation();

        await playVideo(
          randomIdleVideo(anchorIdleVideo, anchorBlinkIdleVideo),
          'Anchor idle'
        );
        await playVideo(variationVideo.forward, `Transition to ${variationVideo.id}`);
        await playVideo(
          randomIdleVideo(variationVideo.idle, variationVideo.blinkIdle),
          `${variationVideo.id} idle`
        );
        await playVideo(variationVideo.reverse, 'Transition back to anchor');
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    commandInput.focus();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        prefetchNextVariation();
      });
    } else {
      prefetchNextVariation();
    }

    runVideoSequence();

    commandInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Tab') {
        return;
      }

      const value = commandInput.value;
      const commandStart = value.search(/\S+$/);
      const prefix = commandStart === -1 ? '' : value.slice(commandStart);
      const match = commands.find((command) => command.startsWith(prefix.toLowerCase()));

      if (!match || match === prefix) {
        return;
      }

      event.preventDefault();
      const leadingText = commandStart === -1 ? value : value.slice(0, commandStart);
      commandInput.value = `${leadingText}${match}`;
    });
  </script>
</body>
</html>
