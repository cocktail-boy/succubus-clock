<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Succubus Anchor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101014;
      color: #f4f1ea;
      font-family: Arial, Helvetica, sans-serif;
    }

    .image-stage {
      position: relative;
      width: min(100vw, 100vh);
      max-width: 100%;
    }

    .clock-panel {
      position: absolute;
      top: 16px;
      left: 50%;
      z-index: 1;
      width: calc(100% - 32px);
      transform: translateX(-50%);
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 2px 10px #000;
    }

    .clock {
      font-size: clamp(18px, 3vw, 32px);
    }

    .clock:focus-visible {
      outline: 2px solid #f4f1ea;
      outline-offset: 6px;
      border-radius: 4px;
    }

    .countdown {
      margin-top: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(12px, 1.8vw, 18px);
      color: rgba(244, 241, 234, 0.86);
    }

    .command-line {
      position: absolute;
      right: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(244, 241, 234, 0.4);
      border-radius: 4px;
      background: rgba(16, 16, 20, 0.78);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      font-family: Consolas, "Courier New", monospace;
    }

    .command-line span {
      color: #f4f1ea;
      flex: 0 0 auto;
    }

    .command-line input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #f4f1ea;
      font: inherit;
    }

    .command-line:focus-within {
      border-color: #f4f1ea;
    }

    img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="image-stage">
    <div class="clock-panel">
      <div class="clock" id="clock" aria-live="polite" tabindex="0"></div>
      <div class="countdown" id="countdown" aria-live="polite"></div>
    </div>
    <img id="anchorImage" src="succubus_anchor_01_4x4/anchor.png" alt="Succubus anchor">
    <label class="command-line">
      <span>&gt;</span>
      <input id="commandInput" type="text" aria-label="Command line" autocomplete="off" spellcheck="false">
    </label>
  </main>
  <script>
    const clock = document.getElementById('clock');
    const countdown = document.getElementById('countdown');
    const anchorImage = document.getElementById('anchorImage');
    const commandInput = document.getElementById('commandInput');
    const anchorImageSrc = 'succubus_anchor_01_4x4/anchor.png';
    const variationImages = [
      'variations/img_0001.png',
      'variations/img_0002.png',
      'variations/img_0003.png',
      'variations/img_0004.png',
      'variations/img_0005.png',
      'variations/img_0006.png',
      'variations/img_0007.png',
      'variations/img_0008.png',
      'variations/img_0009.png',
      'variations/img_0010.png',
      'variations/img_0011.png',
      'variations/img_0012.png',
      'variations/img_0013.png',
      'variations/img_0014.png',
      'variations/img_0015.png',
      'variations/img_0016.png',
      'variations/img_0017.png',
      'variations/img_0018.png'
    ];
    const updateEveryMs = 5000;
    const variationDurationMs = 1000;
    let nextImageUpdateAt = Date.now() + updateEveryMs;
    let variationTimeout;
    const commands = [
      'clock',
      'date',
      'help',
      'image',
      'time'
    ];

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function randomVariationImage() {
      const imageIndex = Math.floor(Math.random() * variationImages.length);
      return variationImages[imageIndex];
    }

    function showVariationImage() {
      anchorImage.src = randomVariationImage();
      nextImageUpdateAt = Date.now() + updateEveryMs;

      clearTimeout(variationTimeout);
      variationTimeout = setTimeout(() => {
        anchorImage.src = anchorImageSrc;
      }, variationDurationMs);
    }

    function updateCountdown() {
      const remainingMs = Math.max(0, nextImageUpdateAt - Date.now());
      const remainingSeconds = Math.ceil(remainingMs / 1000);
      countdown.textContent = `Next image update in ${remainingSeconds}s`;

      if (remainingMs === 0) {
        showVariationImage();
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    updateCountdown();
    setInterval(updateCountdown, 250);
    commandInput.focus();

    commandInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Tab') {
        return;
      }

      const value = commandInput.value;
      const commandStart = value.search(/\S+$/);
      const prefix = commandStart === -1 ? '' : value.slice(commandStart);
      const match = commands.find((command) => command.startsWith(prefix.toLowerCase()));

      if (!match || match === prefix) {
        return;
      }

      event.preventDefault();
      const leadingText = commandStart === -1 ? value : value.slice(0, commandStart);
      commandInput.value = `${leadingText}${match}`;
    });
  </script>
</body>
</html>
